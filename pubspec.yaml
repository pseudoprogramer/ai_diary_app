name: ai_diary
description: AI-powered automatic diary app that summarizes your day and creates beautiful content
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 권한 관리
  permission_handler: ^12.0.1
  
  # 위치 서비스
  geolocator: ^10.1.0
  geocoding: ^2.1.0
  
  # 사진 접근
  image_picker: ^1.0.4
  
  # 캘린더
  device_calendar: ^4.0.0
  
  # HTTP 요청
  http: ^1.1.0
  exif: ^3.3.0
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  photo_manager: ^3.2.1
  background_fetch: ^1.3.5
  image: ^4.2.0
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.1
  android_intent_plus: ^5.1.0
  
  # 상태 관리
  provider: ^6.1.1
  
  # 환경 변수 관리
  flutter_dotenv: ^5.1.0
  
  # 로컬 저장소
  shared_preferences: ^2.2.2
  
  # UI 컴포넌트
  cupertino_icons: ^1.0.2
  
  # 날짜/시간 처리
  intl: ^0.18.1
  
  # 이미지 처리
  cached_network_image: ^3.3.0
  
  # 애니메이션
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
